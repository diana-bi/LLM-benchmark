  CONSTITUTIONAL CONVENTION AND BACKGROUND

  The U.S. Constitution was drafted at the Constitutional Convention held in Philadelphia from May to September in 1787. Fifty-five delegates from twelve states attended the convention. Rhode Island did not participate. George Washington presided over the convention. The delegates represented diverse interests and regions, including merchants, lawyers, farmers, and political leaders. The convention was officially called to revise the Articles of Confederation, but delegates instead decided to create an entirely new framework for federal government. This was a bold and revolutionary decision. The existing government under the Articles was weak and ineffective. The states operated almost independently with minimal federal coordination. Commerce between states was disrupted. Foreign nations did not respect American authority. A stronger union was necessary.

  James Madison is known as the "Father of the Constitution" because he played a principal role in its drafting at the Constitutional Convention in 1787. Madison arrived at the convention extensively prepared with detailed notes on historical governments and political theory. He had studied ancient republics, European monarchies, and the Articles of Confederation to understand what worked and what failed. Madison presented the Virginia Plan, which became the foundation for the Constitution's structure. The Virginia Plan outlined separation of powers among legislative, executive, and judicial branches. It proposed a bicameral legislature with proportional representation. It established an executive elected by Congress. It created a national judiciary. These ideas shaped all subsequent convention debates. Madison actively participated in every major debate and compromise. His philosophical approach balanced federal power with state sovereignty. His careful notes of the convention proceedings are the most complete historical record of the delegates' discussions and why they made specific choices.

  Other key figures included James Wilson, who advocated for popular sovereignty and a strong presidency directly elected by the people. Gouverneur Morris contributed to the precise wording of constitutional provisions and helped refine the Preamble. Alexander Hamilton advocated for a powerful executive and national supremacy. Benjamin Franklin mediated disputes and helped bridge differences between delegates. George Washington's presence lent legitimacy and his support ensured eventual ratification. These delegates had different views but shared commitment to creating a workable constitution.

  ARTICLES OF THE CONSTITUTION

  Article I establishes the legislative branch. Congress consists of the Senate and House of Representatives. The House has representatives from each state based on population. Representatives serve two-year terms and must be citizens for at least seven years. The Senate has two senators from each state, originally elected by state legislatures (later changed by the 17th Amendment to popular election). Senators serve six-year staggered terms and must be citizens for at least nine years. Congress has power to tax, regulate commerce, coin money, establish courts, declare war, and make laws necessary to execute these powers. Congress controls federal spending through appropriations. All bills for raising revenue originate in the House.

  Article II establishes the executive branch led by the President. The President is Commander-in-Chief of the military. The President enforces laws and appoints cabinet officers, federal judges, and other officials with Senate approval. The President can grant pardons, make treaties with Senate approval, and appoint ambassadors. Presidential term is four years. The President is elected through the Electoral College system, not direct popular vote. The Vice President succeeds the President if the President dies or is removed. The President must be a natural-born citizen, at least 35 years old, and a resident for at least 14 years.

  Article III establishes the judicial branch. The Supreme Court is the highest court. Congress creates inferior federal courts. Judges hold office during good behavior (typically lifetime) and cannot have salaries reduced. Federal courts handle cases involving federal law, treaties, disputes between states, and cases involving ambassadors. The Supreme Court has original jurisdiction in certain cases and appellate jurisdiction in others. Federal courts interpret the Constitution and laws. Judges are appointed by the President with Senate approval.

  Articles IV through VII address state relations, the amendment process, supremacy of federal law, and ratification. States must respect each other's official acts and court decisions. Citizens of each state have the same rights in all states. The amendment process requires either Congress or state legislatures to propose amendments. Amendments must be ratified by three-fourths of the states. The Constitution is the supreme law. Judges in every state are bound by the Constitution. The Constitution required ratification by nine of thirteen states to become effective.

  BILL OF RIGHTS AND AMENDMENTS

  The Bill of Rights consists of the first ten amendments, ratified in 1791. The First Amendment guarantees freedom of speech, religion, assembly, petition, and press. The Second Amendment protects the right to keep and bear arms. The Third Amendment prevents quartering of soldiers in homes. The Fourth Amendment protects against unreasonable searches and seizures and requires warrants. The Fifth Amendment protects against self-incrimination, double jeopardy, and provides due process. The Sixth Amendment guarantees speedy trial, legal counsel, and confronting witnesses. The Seventh Amendment ensures jury trials in civil cases. The Eighth Amendment prohibits cruel and unusual punishment. The Ninth Amendment reserves unenumerated rights to the people. The Tenth Amendment reserves powers not granted to the federal government to the states and people.

