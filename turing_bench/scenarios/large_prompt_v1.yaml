# Large Prompt Scenario v1
# Purpose: Prefill throughput stress - where PagedAttention and KV-cache optimizations show up
# Typical output: ~120 tokens
# Source: RFC 7230 (HTTP/1.1 Message Syntax and Routing) - Public Domain - Extended
# Token count: ~1500 tokens

scenario_id: "large_prompt_v1"

prompt: |
  HTTP (Hypertext Transfer Protocol) is the foundational protocol of the World Wide Web. It is a stateless request-response protocol that allows clients and servers to communicate. HTTP/1.1 has been the standard version for many years and provides the basis for web applications, APIs, and content delivery systems. The protocol is relatively simple yet powerful, enabling billions of interactions daily across the internet globally.

  HTTP Message Structure: All HTTP communication follows a consistent message format. Requests begin with a request line containing the HTTP method, request target (uniform resource identifier), and protocol version. This is followed by request headers that provide metadata about the request. An empty line separates headers from an optional request body. Responses similarly consist of a status line with protocol version and status code, followed by response headers and an optional response body. This consistent and predictable structure makes HTTP reliable and enables interoperability.

  HTTP Methods define what action should be performed on a resource. GET retrieves a resource representation without modifying the server state. This method is safe (should not modify resources) and idempotent (same result when called multiple times). POST submits data for processing, potentially creating new resources or triggering side effects. PUT replaces an entire resource at a given URI. PATCH modifies part of a resource without replacing the whole. DELETE removes a resource at a given URI. HEAD works like GET but returns only headers without the response body. OPTIONS queries what methods are available for a resource. TRACE echoes the request for diagnostic purposes. CONNECT establishes a tunnel through a proxy for encrypted protocols. Each method has specific semantics that clients and servers must respect and follow consistently.

  Status Codes communicate the outcome of requests. Status codes are three-digit numbers grouped into five classes based on the first digit. 1xx codes are informational, indicating the request was received and processing continues. 2xx codes indicate success, meaning the request was received, understood, and accepted. 201 Created indicates a new resource was successfully created. 204 No Content indicates success with no response body. 3xx codes indicate redirection, meaning further action is needed. 301 Moved Permanently indicates the resource has permanently relocated. 304 Not Modified indicates the cached resource is still valid. 4xx codes indicate client errors. 400 Bad Request means the request is malformed. 401 Unauthorized means authentication is required. 403 Forbidden means the client lacks permission. 404 Not Found means the resource does not exist. 5xx codes indicate server errors. 500 Internal Server Error means the server encountered an unexpected error. 503 Service Unavailable means the server is temporarily down. Understanding status codes is essential for proper error handling.

  Headers provide metadata about requests and responses. Request headers include Host (target server), User-Agent (client software), Accept (preferred content types), Accept-Language (preferred languages), Accept-Encoding (preferred compression), Authorization (authentication credentials), Cookie (session data), and Cache-Control (cache directives). Response headers include Content-Type (media type), Content-Length (body size), Content-Encoding (compression applied), Cache-Control (caching directives), Set-Cookie (session tokens), Location (redirect target), ETag (version identifier), and Last-Modified (modification time). Headers are case-insensitive field names followed by colons and values. The order of headers is typically insignificant. Headers are essential for features like caching, authentication, compression, and content negotiation.

  Caching is crucial for web performance and efficiency. HTTP caching allows responses to be reused, reducing bandwidth consumption and latency. Caches exist at multiple points: client browsers, intermediary proxies, and reverse proxies in front of servers. The Cache-Control header controls caching behavior. max-age specifies how many seconds a response is fresh. no-cache requires revalidation before reuse. no-store prohibits caching entirely. public means any cache can store it. private means only the client can cache it. must-revalidate requires revalidation after expiration. ETag headers provide entity tags for cache validation. If a response has not changed, servers can return 304 Not Modified instead of retransmitting the response body. Last-Modified headers indicate when resources last changed. Conditional requests using If-Modified-Since and If-None-Match allow clients to request only changed content.

  Content Negotiation allows servers to provide the best representation of a resource based on client preferences. Clients indicate their preferences using Accept headers. Accept specifies preferred media types (application/json, text/html, image/png). Accept-Language specifies preferred languages (en-US, fr-FR). Accept-Encoding specifies preferred compression methods (gzip, deflate). Servers examine these headers and respond with the best matching representation available. The response includes Content-Type (media type), Content-Language (language), and Content-Encoding (compression) headers. This mechanism enables the same resource to be served in multiple formats. A client might request JSON for machine-to-machine interactions while another requests HTML for human viewing.

  Connection Management significantly impacts performance and efficiency. HTTP/1.0 required opening a new TCP connection for each request, causing substantial overhead. HTTP/1.1 introduced persistent connections where multiple requests can use the same TCP connection. The Connection header can signal intent to close after the current response. Keep-Alive headers control connection timeout duration and maximum request counts. Request pipelining allows clients to send multiple requests before receiving responses, though servers must process them sequentially. HTTP/2 added multiplexing to send multiple requests and responses concurrently over a single connection, significantly improving performance.

  Authentication and Security protect resources and data from unauthorized access. Basic authentication encodes credentials as Base64 and includes them in the Authorization header. Digest authentication uses challenge-response with cryptographic hashing, avoiding direct password transmission. Bearer tokens (JWT, OAuth tokens) provide delegated access. The WWW-Authenticate header challenges unauthenticated clients. HTTPS (HTTP over TLS) encrypts all communication between client and server, protecting credentials and sensitive data from eavesdropping. Secure cookies with the Secure flag are only transmitted over HTTPS. HttpOnly flag prevents client-side JavaScript access. SameSite attribute mitigates cross-site request forgery attacks. Proper authentication is essential for protecting sensitive operations.

  Proxies serve important roles in HTTP infrastructure and networking. Forward proxies represent clients, intercepting their requests for routing, caching, filtering, and security. Corporate proxies commonly cache content and filter malicious sites. Reverse proxies represent servers, distributing incoming requests to backend servers. CDNs use reverse proxies to cache content near users. Load balancers use reverse proxies to distribute requests across multiple servers. The Via header records proxy hops. X-Forwarded-For preserves original client IP addresses through proxy chains. Proxies must respect Cache-Control directives and maintain request/response integrity. Proper proxy configuration improves performance, security, and reliability.

  Message Bodies carry request and response data across the network. Content-Length specifies the exact body size in bytes. Transfer-Encoding: chunked allows streaming responses without knowing total size, useful for dynamically generated content. Bodies can contain any binary data: text documents, images, videos, compressed files, JSON, XML. Content-Encoding indicates compression applied (gzip, deflate, compress, brotli). Decompression is transparent to applications. Large bodies are often compressed to reduce bandwidth. Proper body handling ensures correct data transmission and interpretation. Connection handling during body transmission is important for reliability.

  HTTP Security Considerations include protecting against various attacks. HTTPS prevents eavesdropping. Authentication prevents unauthorized access. Authorization controls what authenticated users can do. Secure cookies prevent session hijacking. CORS headers prevent unauthorized cross-origin requests. CSP headers mitigate injection attacks. Input validation prevents injection attacks. Rate limiting prevents DoS attacks. Security headers provide additional protection. Understanding HTTP security is essential for developing safe applications.

  HTTP Semantics and Architecture: HTTP relies on clear semantics for each method and status code. Methods like GET, POST, PUT, DELETE have well-defined meanings. Status codes precisely communicate what happened. This clarity enables proper error recovery and flow control. Clients understand what failed and how to respond. Servers understand what action clients request. This semantic clarity is essential for interoperability across diverse implementations. Many systems rely on correct HTTP semantics for functionality.

  Request and Response Cycles: A typical HTTP cycle begins with a client request. The request includes method, URI, headers, and optional body. The server receives and processes the request. The server sends a response with status code, headers, and optional body. The client receives and processes the response. If successful, the client processes the data. If unsuccessful, the client interprets the status code and acts accordingly. Multiple cycles can occur over a single persistent connection. Connection state management is important for efficiency.

  Streaming and Chunked Encoding: HTTP supports streaming large responses without knowing total size. Transfer-Encoding: chunked breaks responses into chunks. Each chunk includes size information followed by data. This enables servers to stream data as it is generated. Clients receive and process chunks incrementally. Streaming is valuable for videos, large files, and generated content. Without chunking, servers must buffer entire responses. Chunking reduces memory requirements and improves responsiveness for large transfers.

  Request Timeouts and Retries: HTTP connections can timeout if idle too long. Servers may close connections after inactivity. Clients should handle connection closures gracefully. Clients can retry failed requests. Safe requests (GET, HEAD) can be retried safely. Idempotent requests (GET, PUT, DELETE) produce same results when retried. Non-idempotent requests (POST) should not be automatically retried without user confirmation. Exponential backoff prevents overwhelming servers. Circuit breakers stop requests when services are unavailable. Proper retry logic improves reliability.

  Compression Methods and Efficiency: HTTP supports multiple compression methods. GZIP is most common, providing good compression ratios. Deflate uses different compression algorithm. Brotli provides better compression at higher CPU cost. Clients indicate supported methods via Accept-Encoding. Servers compress responses if client supports the method. Compression reduces bandwidth significantly for text content. Compression has CPU cost, so not all responses are compressed. Large binary files may already be compressed. Compression is negotiated dynamically based on client capabilities.

  Load Balancing and Scalability: HTTP enables horizontal scaling through load balancing. Multiple servers handle requests. Load balancers distribute requests across servers. Round-robin distributes evenly. Least connections routes to least busy server. IP hash maintains session affinity. Load balancers can also perform health checks. Unhealthy servers are removed from rotation. Servers can be added or removed dynamically. HTTP's stateless nature enables easy load balancing. Proper load balancing improves availability and performance.

  API Design and REST Principles: HTTP is the foundation of REST (Representational State Transfer) APIs. REST uses HTTP methods for operations. GET retrieves resources. POST creates resources. PUT updates resources. DELETE removes resources. URIs identify resources. HTTP status codes indicate results. Headers provide metadata. REST APIs are widely used and understood. REST simplifies API design and client implementation. Understanding REST principles improves API design quality.

  Web Servers and Application Servers: Web servers handle HTTP requests. Apache, Nginx are common web servers. They parse requests, locate files, send responses. Application servers run application code. They handle business logic, database access. Web servers often proxy requests to application servers. Multiple application servers provide redundancy. Caching can occur at web server layer. Compression often happens at web server layer. Proper web server configuration improves performance significantly.

  Client Libraries and HTTP Frameworks: Many client libraries exist for HTTP. Browsers provide native HTTP support. curl and wget are command-line tools. Programming language libraries (urllib, requests, httpx) simplify HTTP client implementation. Web frameworks (Django, Flask, Express) simplify server implementation. Frameworks handle common tasks like routing, middleware, error handling. Framework selection impacts development speed and application characteristics. Understanding framework capabilities improves development efficiency.

  Monitoring and Debugging HTTP: HTTP traffic can be monitored and debugged. Browser developer tools show network activity. Proxy tools capture and analyze traffic. Server logs record requests and responses. Monitoring includes request rates, response times, status code distribution. Performance monitoring identifies slow requests. Error monitoring identifies broken endpoints. Alerting notifies operators of problems. Proper monitoring enables quick problem detection and resolution. Understanding HTTP helps in effective monitoring.

  HTTP provides rich semantics for reliable, efficient web communication at scale. Request methods define operations clearly. Status codes communicate outcomes precisely. Headers provide extensible metadata. Persistent connections reduce overhead. Compression reduces bandwidth. Caching avoids redundant transfers. Content negotiation provides flexibility. Load balancing enables scalability. These features work together to enable reliable distributed systems. Understanding HTTP fundamentals is essential for developing quality web applications.

  Summarize the key aspects of HTTP message structure, methods, status codes, headers, caching, content negotiation, and authentication in exactly 3 bullet points.

expected_tokens: 120
temperature: 0.0
seed: 42

# Warmup configuration
warmup: 20  # GPU default; 10 for CPU backends

# Sequential configuration
runs: 50

# Validity layer configuration
validity:
  min_length: 50       # More lenient for complex content
  max_length: 300

  similarity_threshold: 0.92

  exact_match: false

# Concurrent configuration
concurrent:
  rps: 16
  concurrency: 32
  num_requests: 500
