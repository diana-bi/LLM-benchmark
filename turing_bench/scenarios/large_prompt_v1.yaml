# Large Prompt Scenario v1 (REBALANCED)
# Purpose: Prefill throughput stress - where KV-cache optimizations show up
# Typical output: ~40 tokens
# Source: RFC 7230 (HTTP/1.1 Message Syntax and Routing) - Public Domain - Truncated
# Token count: ~800 tokens (rebalanced to fit 2048-token context window with margin)

scenario_id: "large_prompt_v1"

prompt: |
  HTTP (Hypertext Transfer Protocol) is the foundational protocol of the World Wide Web. It is a stateless request-response protocol that allows clients and servers to communicate. HTTP/1.1 has been the standard version for many years and provides the basis for web applications, APIs, and content delivery systems.

  HTTP Message Structure: All HTTP communication follows a consistent message format. Requests begin with a request line containing the HTTP method, request target, and protocol version. This is followed by request headers that provide metadata about the request. An empty line separates headers from an optional request body. Responses similarly consist of a status line with protocol version and status code, followed by response headers and an optional response body. This structure makes HTTP reliable and enables interoperability.

  HTTP Methods define what action should be performed on a resource. GET retrieves a resource without modifying the server state. This method is safe and idempotent. POST submits data for processing, potentially creating new resources. PUT replaces an entire resource. PATCH modifies part of a resource. DELETE removes a resource. HEAD works like GET but returns only headers. OPTIONS queries what methods are available. Each method has specific semantics that clients and servers must respect.

  Status Codes communicate request outcomes. Codes are three-digit numbers grouped into five classes. 1xx codes are informational. 2xx codes indicate success. 201 Created indicates a new resource was created. 204 No Content indicates success with no body. 3xx codes indicate redirection. 301 Moved Permanently indicates the resource relocated. 304 Not Modified indicates cached resource is valid. 4xx codes indicate client errors. 400 Bad Request means malformed request. 401 Unauthorized means authentication required. 403 Forbidden means lacking permission. 404 Not Found means resource doesn't exist. 5xx codes indicate server errors. 500 Internal Server Error means unexpected server error. 503 Service Unavailable means temporarily down.

  Headers provide metadata about requests and responses. Request headers include Host, User-Agent, Accept, Accept-Language, Accept-Encoding, Authorization, and Cookie. Response headers include Content-Type, Content-Length, Content-Encoding, Cache-Control, Set-Cookie, Location, ETag, and Last-Modified. Headers are case-insensitive field names followed by colons and values. Headers are essential for caching, authentication, compression, and content negotiation.

  Caching is crucial for web performance. HTTP caching allows responses to be reused, reducing bandwidth and latency. Caches exist at client browsers, intermediary proxies, and reverse proxies. The Cache-Control header controls caching. max-age specifies freshness duration. no-cache requires revalidation. no-store prohibits caching. public means any cache can store it. private means only the client can cache it. ETag headers provide entity tags for validation. If unchanged, servers can return 304 Not Modified instead of retransmitting the body.

  Content Negotiation allows servers to provide the best resource representation based on client preferences. Clients indicate preferences using Accept headers for media types, languages, and compression. Servers respond with Content-Type, Content-Language, and Content-Encoding headers. This mechanism enables the same resource to be served in multiple formats for different client types.

  Connection Management impacts performance significantly. HTTP/1.0 required opening a new connection for each request. HTTP/1.1 introduced persistent connections where multiple requests use the same connection. Keep-Alive headers control timeout and request counts. HTTP/2 added multiplexing to send multiple requests and responses concurrently over a single connection.

  Based on the comprehensive information above about HTTP protocol, message structure, methods, status codes, headers, caching, and connection management, provide a 2-3 sentence summary of how HTTP enables reliable web communication.

expected_tokens: 40
temperature: 0.0
seed: 42

# Warmup configuration
warmup: 20  # GPU default; 10 for CPU backends

# Sequential configuration
runs: 50

# Validity layer configuration
validity:
  min_length: 50       # More lenient for complex content
  max_length: 300

  similarity_threshold: 0.92

  exact_match: false

# Concurrent configuration
# Reduced from 16 RPS / 32 concurrency / 500 requests
# Heavy prompt (~800 tokens) needs lower pressure than small_prompt_v1
concurrent:
  rps: 8
  concurrency: 8
  num_requests: 200
