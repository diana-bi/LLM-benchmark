# Universal Adapter for OpenAI-Compatible Endpoints
#
# This is the ONLY adapter you need for any server that exposes
# POST /v1/chat/completions with streaming support.
#
# The SSE parser is smart: it tries multiple content paths
# automatically to handle format variations across backends.
#
# Use this adapter for:
# - vLLM
# - llama.cpp
# - Ollama
# - OpenVINO (with wrapper)
# - TensorRT-LLM
# - LM Studio
# - Any custom server exposing OpenAI-compatible API
#
# If a new backend emerges with a fundamentally different format,
# extend the fallback_paths list below. Do NOT create new adapters.

backend: openai_compatible
description: "Universal adapter for any OpenAI-compatible endpoint"

endpoint: /v1/chat/completions

# Primary SSE content path (works for most servers)
sse_content_path: "choices[0].delta.content"

# Fallback paths if primary doesn't yield tokens
# The parser tries these in order until it finds tokens
fallback_paths:
  - "choices[0].delta.content"      # vLLM, most servers (OpenAI format)
  - "content"                         # llama.cpp simple format
  - "message.content"                 # Some implementations
  - "delta.content"                   # Alternative nesting
  - "text"                            # Some custom servers

# What signals the end of the stream
done_signal: "[DONE]"

# Alternative done signals (some backends use different markers)
alternate_done_signals:
  - "[DONE]"
  - '{"stop": true}'
  - '{"finish_reason": "stop"}'

# Skip empty deltas (some backends send these as padding)
skip_empty_deltas: true

# Hardware type - affects warmup defaults
hardware_type: gpu
warmup_default: 20

# Timeouts (increased for CPU deployments with large prompts)
# GPU: 30s request / 60s stream is usually sufficient
# CPU with large prompts: May need 60s+ request timeout
request_timeout: 60
stream_timeout: 120

# Concurrent workload defaults
# Tune these per hardware, but the benchmark is portable across settings
concurrent:
  rps: 16              # Requests per second (fixed RPS)
  concurrency: 32      # Max in-flight requests
  num_requests: 500    # Total requests per scenario
